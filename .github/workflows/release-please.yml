name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release Please
    runs-on: ubuntu-latest
    env:
      # Forzamos el uso de Node.js 24 para evitar el aviso de deprecación
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Run Release Please
        uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: node

      # Solo se ejecuta el despliegue cuando se crea una versión real (tag)
      - name: Checkout (on release)
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v4

      - name: Setup Node.js (on release)
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Actualizado de 20 a 24 para máxima velocidad
          cache: npm

      - name: Install & Build (on release)
        if: ${{ steps.release.outputs.release_created }}
        run: npm ci && npm run build
